<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 针对手机端适配的视口设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>千里江山 · 极简八字推演</title>
    
    <!-- PWA 必备：清单文件与 iOS 适配 Meta 标签 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#122630">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="八字推演">
    <link rel="apple-touch-icon" href="1.png">

    <!-- 引入 Lunar 日历库 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <!-- 引入古典中文字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            var-blue-dark: #122630;
            --blue-dark: #122630;   /* 深霁青 */
            --blue: #1C4A61;        /* 霁青 */
            --green: #2B7A5A;       /* 石绿 */
            --gold: #C9A063;        /* 泥金 */
            --dark: #2C2C2C;        /* 焦墨 */
            --red: #8B2C24;         /* 朱砂 */
            --glass-bg: rgba(245, 245, 240, 0.65); /* 稍微增加不透明度，防止彩色背景干扰文字 */
            
            --font-main: 'Noto Serif SC', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* 手机端适配：允许上下滚动，防止被键盘遮挡 */
        body {
            font-family: var(--font-main);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto; 
            background-color: #122630;
            padding: 20px 0;
        }

        /* ====== 背景图：虚实相生动效 (修改为生机勃勃的彩色) ====== */
        .bg-image {
            position: fixed;
            top: -10vh; 
            left: -5vw;
            width: 110vw; 
            height: 120vh; 
            background-image: url('1.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
            animation: introBg 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes introBg {
            0% { 
                filter: blur(0px) brightness(1.1) saturate(1); 
                transform: scale(1.05); 
            }
            100% { 
                /* 最终态：去掉灰白，仅虚化并稍微压暗，提高色彩饱和度，生机盎然！ */
                filter: blur(12px) brightness(0.75) saturate(1.3); 
                transform: scale(1); 
            }
        }

        /* ====== 主控制面板 ====== */
        .glass-panel {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 50px 60px;
            width: 90%;
            max-width: 680px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(255,255,255,0.4);
            opacity: 0;
            transform: translateY(30px);
            animation: introPanel 1.5s 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            margin: auto;
        }

        @keyframes introPanel {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ====== 标题区 ====== */
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 {
            font-size: 2.2rem;
            color: var(--blue-dark);
            letter-spacing: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            text-indent: 12px;
        }
        .header-line {
            width: 1px;
            height: 30px;
            background: var(--gold);
            margin: 0 auto;
            position: relative;
        }
        .header-line::after {
            content: '';
            position: absolute;
            bottom: -3px; left: -2px;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--red);
        }

        /* ====== 极简标签页 ====== */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-family: var(--font-main);
            font-size: 1.1rem;
            color: #666;
            cursor: pointer;
            padding-bottom: 5px;
            position: relative;
            transition: 0.4s;
            font-weight: 300;
        }
        .tab-btn.active { color: var(--blue-dark); font-weight: 600; }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            width: 0; height: 2px;
            background: var(--gold);
            transition: 0.4s;
            transform: translateX(-50%);
        }
        .tab-btn.active::after { width: 100%; }

        /* ====== 表单区 ====== */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px 15px;
            margin-bottom: 35px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            grid-column: span 2;
        }
        .input-group.wide { grid-column: span 3; }
        .input-group label {
            font-size: 0.75rem;
            color: var(--blue);
            margin-bottom: 8px;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(28, 74, 97, 0.3);
            padding: 5px 0 8px 0;
            font-family: var(--font-main);
            font-size: 1.2rem;
            color: var(--dark);
            text-align: center;
            transition: 0.3s;
            border-radius: 0;
            -webkit-appearance: none; /* 移除手机端默认样式 */
        }
        input:focus {
            outline: none;
            border-bottom: 1px solid var(--green);
            background: linear-gradient(to top, rgba(43, 122, 90, 0.08), transparent);
        }

        .checkbox-group {
            grid-column: span 6;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--dark);
            opacity: 0.8;
        }

        /* ====== 按钮 ====== */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--green);
            border: 1px solid var(--green);
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 1.1rem;
            letter-spacing: 10px;
            text-indent: 10px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-submit:hover, .btn-submit:active {
            background: var(--green);
            color: #fff;
            box-shadow: 0 10px 20px rgba(43, 122, 90, 0.25);
            letter-spacing: 15px;
        }

        /* ====== 结果展示区 ====== */
        .result-box {
            margin-top: 35px;
            padding-top: 30px;
            border-top: 1px solid rgba(201, 160, 99, 0.3);
            display: none;
        }

        .date-info {
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.8;
            color: var(--blue-dark);
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0.9;
            font-weight: 600;
        }

        .bazi-layout {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 25px;
        }

        .pillar-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pillar-title {
            font-size: 0.75rem;
            color: var(--blue);
            margin-bottom: 15px;
            letter-spacing: 2px;
            writing-mode: vertical-rl;
        }

        .bazi-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--dark);
            letter-spacing: 10px;
            margin-bottom: 20px;
        }

        .seal {
            border: 1px solid var(--red);
            color: var(--red);
            font-size: 0.7rem;
            padding: 5px 3px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            border-radius: 2px;
            margin-top: 8px;
            opacity: 0.85;
        }
        .seal-nayin {
            border-color: var(--blue);
            color: var(--blue);
        }

        @keyframes fadeInResult {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========================================= */
        /* ======= 手机端深度适配 (Media Queries) ======= */
        /* ========================================= */
        @media (max-width: 600px) {
            .glass-panel { 
                padding: 30px 20px; 
                width: 92%; 
                margin: 0 auto;
            }
            .header h1 { font-size: 1.8rem; letter-spacing: 8px; text-indent: 8px;}
            
            /* 手机端输入框重排：每行放两个，时间/分钟各占一行一半 */
            .form-grid { gap: 15px 10px; }
            .input-group { grid-column: span 3; } /* 一行两个 */
            .input-group.wide { grid-column: span 3; }
            
            /* 八字排版在手机上稍微缩小，以防折行 */
            .bazi-layout { gap: 10px; justify-content: space-around; }
            .bazi-text { font-size: 1.6rem; letter-spacing: 6px; }
            .pillar-title { font-size: 0.7rem; margin-bottom: 10px; }
            .seal { font-size: 0.65rem; padding: 4px 2px; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="glass-panel">
        <div class="header">
            <h1>八字推演</h1>
            <div class="header-line"></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-solar" onclick="switchTab('solar')">公历</button>
            <button class="tab-btn" id="tab-lunar" onclick="switchTab('lunar')">农历</button>
        </div>

        <div class="form-grid">
            <div class="input-group">
                <label>年 (YYYY)</label>
                <input type="number" id="in-year" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>月 (MM)</label>
                <input type="number" id="in-month" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>日 (DD)</label>
                <input type="number" id="in-day" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group wide">
                <label>时辰 (0-23)</label>
                <input type="number" id="in-hour" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group wide">
                <label>分钟 (0-59)</label>
                <input type="number" id="in-minute" pattern="[0-9]*" inputmode="numeric">
            </div>
            
            <div class="checkbox-group" id="lunar-options">
                <input type="checkbox" id="is-leap">
                <label for="is-leap">此月为闰月</label>
            </div>
        </div>

        <button class="btn-submit" onclick="calculateBazi()">推 演</button>

        <div class="result-box" id="result-box">
            <div class="date-info" id="date-display"></div>
            
            <div class="bazi-layout">
                <div class="pillar-card">
                    <div class="pillar-title">时柱</div>
                    <div class="bazi-text" id="t-ganzhi"></div>
                    <div class="seal" id="t-wuxing"></div>
                    <div class="seal seal-nayin" id="t-nayin"></div>
                </div>
                <div class="pillar-card">
                    <div class="pillar-title">日柱</div>
                    <div class="bazi-text" id="d-ganzhi"></div>
                    <div class="seal" id="d-wuxing"></div>
                    <div class="seal seal-nayin" id="d-nayin"></div>
                </div>
                <div class="pillar-card">
                    <div class="pillar-title">月柱</div>
                    <div class="bazi-text" id="m-ganzhi"></div>
                    <div class="seal" id="m-wuxing"></div>
                    <div class="seal seal-nayin" id="m-nayin"></div>
                </div>
                <div class="pillar-card">
                    <div class="pillar-title">年柱</div>
                    <div class="bazi-text" id="y-ganzhi"></div>
                    <div class="seal" id="y-wuxing"></div>
                    <div class="seal seal-nayin" id="y-nayin"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PWA Service Worker 注册代码
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Service Worker 注册成功!'))
                    .catch(err => console.log('Service Worker 注册失败:', err));
            });
        }

        let currentMode = 'solar';

        window.onload = () => {
            const now = new Date();
            document.getElementById('in-year').value = now.getFullYear();
            document.getElementById('in-month').value = now.getMonth() + 1;
            document.getElementById('in-day').value = now.getDate();
            document.getElementById('in-hour').value = now.getHours();
            document.getElementById('in-minute').value = now.getMinutes();
        };

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-solar').classList.remove('active');
            document.getElementById('tab-lunar').classList.remove('active');
            document.getElementById('tab-' + mode).classList.add('active');
            
            document.getElementById('lunar-options').style.display = (mode === 'lunar') ? 'flex' : 'none';
        }

        function calculateBazi() {
            const y = parseInt(document.getElementById('in-year').value);
            const m = parseInt(document.getElementById('in-month').value);
            const d = parseInt(document.getElementById('in-day').value);
            const h = parseInt(document.getElementById('in-hour').value);
            const min = parseInt(document.getElementById('in-minute').value);
            const isLeap = document.getElementById('is-leap').checked;

            if (!y || !m || !d) {
                alert("需将年月日填写完整方可推演！");
                return;
            }

            let solarDate, lunarDate;

            try {
                if (currentMode === 'solar') {
                    solarDate = Solar.fromYmdHms(y, m, d, h || 0, min || 0, 0);
                    lunarDate = solarDate.getLunar();
                } else {
                    const lunarMonth = isLeap ? -Math.abs(m) : Math.abs(m);
                    lunarDate = Lunar.fromYmdHms(y, lunarMonth, d, h || 0, min || 0, 0);
                    solarDate = lunarDate.getSolar();
                }
            } catch (error) {
                alert("星象有误（日期输入不合法），请重新核对。\n" + error.message);
                return;
            }

            const baZi = lunarDate.getEightChar();
            
            document.getElementById('date-display').innerHTML = `
                公历：${solarDate.toYmdHms()} <br>
                农历：${lunarDate.toString()}
            `;

            document.getElementById('y-ganzhi').innerText = baZi.getYearGan() + baZi.getYearZhi();
            document.getElementById('m-ganzhi').innerText = baZi.getMonthGan() + baZi.getMonthZhi();
            document.getElementById('d-ganzhi').innerText = baZi.getDayGan() + baZi.getDayZhi();
            document.getElementById('t-ganzhi').innerText = baZi.getTimeGan() + baZi.getTimeZhi();

            document.getElementById('y-wuxing').innerText = baZi.getYearWuXing() + "局";
            document.getElementById('m-wuxing').innerText = baZi.getMonthWuXing() + "局";
            document.getElementById('d-wuxing').innerText = baZi.getDayWuXing() + "局";
            document.getElementById('t-wuxing').innerText = baZi.getTimeWuXing() + "局";

            document.getElementById('y-nayin').innerText = baZi.getYearNaYin();
            document.getElementById('m-nayin').innerText = baZi.getMonthNaYin();
            document.getElementById('d-nayin').innerText = baZi.getDayNaYin();
            document.getElementById('t-nayin').innerText = baZi.getTimeNaYin();

            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            
            resultBox.style.animation = 'none';
            resultBox.offsetHeight; 
            resultBox.style.animation = 'fadeInResult 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards'; 
        }
    </script>
</body>
</html>
