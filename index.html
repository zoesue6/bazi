<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>千里江山 · 乾坤推演</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#122630">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="乾坤推演">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- 引入 Lunar 日历库 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-dark: #122630;   /* 深霁青 */
            --blue: #1C4A61;        /* 霁青 */
            --green: #2B7A5A;       /* 石绿 */
            --gold: #C9A063;        /* 泥金 */
            --dark: #2C2C2C;        /* 焦墨 */
            --gray: #555555;        /* 雅灰 */
            --red: #8B2C24;         /* 朱砂 */
            --glass-bg: rgba(245, 245, 240, 0.75); 
            
            --font-main: 'Noto Serif SC', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto; 
            background-color: #122630;
            padding: 40px 0;
            scroll-behavior: smooth;
        }

        /* ====== 背景虚实相生动效 ====== */
        .bg-image {
            position: fixed; top: -10vh; left: -5vw; width: 110vw; height: 120vh; 
            background-image: url('1.png'); background-size: cover; background-position: center;
            z-index: 0; animation: introBg 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes introBg {
            0% { filter: blur(0px) brightness(1.1) saturate(1); transform: scale(1.05); }
            100% { filter: blur(14px) brightness(0.75) saturate(1.2); transform: scale(1); }
        }

        /* ====== 主面板 ====== */
        .glass-panel {
            position: relative; z-index: 10; background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 16px;
            padding: 50px 60px; width: 92%; max-width: 680px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(255,255,255,0.4);
            opacity: 0; transform: translateY(30px);
            animation: introPanel 1.5s 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; margin: auto;
        }
        @keyframes introPanel { to { opacity: 1; transform: translateY(0); } }

        /* ====== 标题区 ====== */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; color: var(--blue-dark); letter-spacing: 12px; font-weight: 900; margin-bottom: 10px; text-indent: 12px; }
        .header-line { width: 1px; height: 30px; background: var(--gold); margin: 0 auto; position: relative; }
        .header-line::after { content: ''; position: absolute; bottom: -3px; left: -2px; width: 5px; height: 5px; border-radius: 50%; background: var(--red); }
        
        .tabs { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; }
        .tab-btn { background: none; border: none; font-family: var(--font-main); font-size: 1.1rem; color: #777; cursor: pointer; padding-bottom: 5px; position: relative; transition: 0.4s; font-weight: 600; }
        .tab-btn.active { color: var(--blue-dark); font-weight: 900; }
        .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: var(--gold); transition: 0.4s; transform: translateX(-50%); }
        .tab-btn.active::after { width: 100%; }

        /* ====== 表单区 ====== */
        .form-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px 15px; margin-bottom: 35px; }
        .input-group { display: flex; flex-direction: column; grid-column: span 2; }
        .input-group.full { grid-column: span 6; }
        .input-group label { font-size: 0.75rem; color: var(--blue); margin-bottom: 8px; letter-spacing: 2px; font-weight: 600; opacity: 0.9; }
        
        input { background: transparent; border: none; border-bottom: 1px solid rgba(28, 74, 97, 0.3); padding: 8px 0; font-family: var(--font-main); font-size: 1.2rem; color: var(--dark); text-align: center; transition: 0.3s; border-radius: 0; -webkit-appearance: none; }
        input:focus { outline: none; border-bottom: 1px solid var(--green); background: linear-gradient(to top, rgba(43, 122, 90, 0.08), transparent); }
        input::placeholder { color: rgba(28, 74, 97, 0.3); font-size: 1rem; font-weight: 300; }

        .gender-toggle { display: flex; gap: 10px; height: 100%; align-items: flex-end; padding-bottom: 2px;}
        .gender-btn { flex: 1; padding: 8px 0; font-size: 0.95rem; font-family: var(--font-main); background: transparent; border: 1px solid rgba(28, 74, 97, 0.3); color: var(--blue); cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .gender-btn.active { background: var(--green); color: white; border-color: var(--green); box-shadow: 0 4px 10px rgba(43, 122, 90, 0.2); }

        .checkbox-group { grid-column: span 6; display: none; justify-content: center; align-items: center; gap: 10px; font-size: 0.9rem; opacity: 0.8; }

        .btn-submit { width: 100%; padding: 15px; background: transparent; color: var(--green); border: 1px solid var(--green); border-radius: 4px; font-family: var(--font-main); font-size: 1.1rem; letter-spacing: 10px; text-indent: 10px; cursor: pointer; transition: all 0.4s ease; font-weight: 600;}
        .btn-submit:hover, .btn-submit:active { background: var(--green); color: #fff; box-shadow: 0 10px 20px rgba(43, 122, 90, 0.25); letter-spacing: 15px; }

        /* ====== 结果展示区 ====== */
        .result-box { margin-top: 40px; padding-top: 40px; border-top: 1px solid rgba(201, 160, 99, 0.4); display: none; position: relative; }
        
        .date-info { text-align: center; margin-bottom: 35px; line-height: 2; color: var(--blue-dark); font-size: 0.9rem; letter-spacing: 1px; font-weight: 600; position: relative; z-index: 1;}
        .date-info span { color: var(--red); font-size: 1.1rem; margin: 0 5px;}

        /* 八字排盘连动效 */
        .bazi-layout { display: flex; flex-direction: row-reverse; justify-content: center; gap: 25px; margin-bottom: 30px; position: relative; z-index: 1;}
        .pillar-card { display: flex; flex-direction: column; align-items: center; opacity: 0; transform: translateY(20px); }
        .pillar-title { font-size: 0.75rem; color: var(--blue); margin-bottom: 15px; letter-spacing: 2px; writing-mode: vertical-rl; }
        .bazi-text { writing-mode: vertical-rl; text-orientation: upright; font-size: 2.4rem; font-weight: 400; color: var(--dark); letter-spacing: 10px; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(255,255,255,0.8);}
        .seal { border: 1px solid var(--red); color: var(--red); font-size: 0.7rem; padding: 5px 3px; writing-mode: vertical-rl; text-orientation: upright; border-radius: 2px; margin-top: 8px; opacity: 0.85; background: rgba(255,255,255,0.5);}
        .seal-nayin { border-color: var(--blue); color: var(--blue); }

        @keyframes pillarFade { to { opacity: 1; transform: translateY(0); } }

        /* ====== 命局格局剖析区 ====== */
        .geju-section { margin-top: 25px; position: relative; z-index: 1; }
        .geju-header { text-align: center; margin-bottom: 20px; }
        .geju-title { font-size: 1.1rem; color: var(--blue-dark); font-weight: 900; letter-spacing: 8px; margin-bottom: 8px; position: relative; display: inline-block;}
        .geju-title::before, .geju-title::after { content: '·'; color: var(--gold); margin: 0 10px; }
        .geju-daymaster { font-size: 0.95rem; color: var(--green); letter-spacing: 1px; font-weight: 600;}
        
        .geju-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.4));
            border: 1px solid rgba(201, 160, 99, 0.4); border-radius: 12px; padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); opacity: 0; transform: translateY(20px);
        }
        .geju-tags { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .g-tag { padding: 4px 12px; border-radius: 4px; font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; }
        .inner-tag { background: rgba(43, 122, 90, 0.1); color: var(--green); border: 1px solid rgba(43, 122, 90, 0.3); }
        .outer-tag { background: rgba(201, 160, 99, 0.1); color: #B37D40; border: 1px solid rgba(201, 160, 99, 0.3); }
        .strength-tag { background: rgba(139, 44, 36, 0.08); color: var(--red); border: 1px solid rgba(139, 44, 36, 0.25); }
        .geju-desc { font-family: var(--font-sans); font-size: 0.95rem; color: var(--dark); line-height: 1.8; text-align: justify; opacity: 0.9;}
        .geju-desc strong { font-family: var(--font-main); font-size: 1.05rem; color: var(--blue-dark); letter-spacing: 1px;}

        /* ====== 六十四卦高级排版区 ====== */
        .gua-section {
            position: relative; z-index: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.4));
            border: 1px solid rgba(201, 160, 99, 0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px; border-radius: 12px; margin-top: 25px;
        }
        .gua-header { display: flex; align-items: center; gap: 25px; margin-bottom: 25px; border-bottom: 1px dashed rgba(201, 160, 99, 0.4); padding-bottom: 20px;}
        .gua-svg-box { width: 60px; flex-shrink: 0; }
        
        /* 爻线的精准样式，等待 Observer 触发 */
        .yao-line { stroke: var(--blue-dark); stroke-width: 8; stroke-linecap: round; transform-origin: center; opacity: 0; }
        @keyframes drawYao { 
            0% { opacity: 0; transform: scaleX(0); } 
            100% { opacity: 1; transform: scaleX(1); } 
        }
        
        .gua-title-area { flex: 1; }
        .gua-badge { display: inline-block; background: var(--gold); color: #fff; font-size: 0.75rem; padding: 3px 10px; border-radius: 2px; margin-bottom: 10px; letter-spacing: 2px;}
        .gua-name { font-size: 2rem; color: var(--blue-dark); font-weight: 900; letter-spacing: 6px; }
        
        .gua-content { text-align: justify; }
        .gua-classical { font-size: 1.05rem; color: var(--blue); font-weight: 600; line-height: 1.8; margin-bottom: 20px; letter-spacing: 1.5px; position: relative; padding-left: 20px;}
        .gua-classical::before { content: '『'; position: absolute; left: -5px; top: -5px; font-size: 1.5rem; opacity: 0.5; color: var(--gold);}
        .gua-classical::after { content: '』'; font-size: 1.5rem; opacity: 0.5; color: var(--gold); position: relative; top: 5px; right: -5px;}
        
        .gua-psycho { font-family: var(--font-sans); font-size: 0.95rem; color: var(--gray); line-height: 1.8; border-left: 4px solid var(--green); padding-left: 15px; background: rgba(43, 122, 90, 0.05); padding: 15px 15px 15px 20px; border-radius: 0 8px 8px 0;}
        .gua-psycho strong { color: var(--blue-dark); font-weight: 600; font-family: var(--font-main); font-size: 1.05rem;}

        /* ====== 历史纪要区 ====== */
        .history-section { margin-top: 50px; padding-top: 30px; border-top: 1px dashed rgba(201, 160, 99, 0.4); display: none; }
        .history-title { text-align: center; font-size: 0.85rem; color: var(--blue); letter-spacing: 6px; margin-bottom: 20px; font-weight: 600;}
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-radius: 8px; background: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.6); cursor: pointer; transition: 0.3s;
        }
        .history-item:hover { background: rgba(255,255,255,0.9); transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.08); border-color: var(--gold);}
        .h-name { font-weight: 900; color: var(--blue-dark); font-size: 1.1rem; letter-spacing: 2px;}
        .h-gua { font-size: 0.85rem; color: var(--green); border: 1px solid var(--green); padding: 2px 8px; border-radius: 12px; letter-spacing: 1px;}
        .h-date { font-size: 0.8rem; color: #888; font-family: var(--font-sans);}
        
        .btn-clear { background: none; border: none; color: var(--red); opacity: 0.5; font-size: 0.85rem; letter-spacing: 3px; cursor: pointer; display: block; margin: 30px auto 0; transition: 0.3s; font-family: var(--font-main);}
        .btn-clear:hover { opacity: 1; transform: scale(1.05);}

        @media (max-width: 600px) {
            .glass-panel { padding: 30px 20px; width: 94%; }
            .header h1 { font-size: 1.8rem; }
            .form-grid { gap: 15px 10px; }
            .input-group { grid-column: span 3; } 
            .input-group.full { grid-column: span 6; }
            .bazi-layout { gap: 10px; }
            .bazi-text { font-size: 1.8rem; }
            .geju-tags { gap: 10px; }
            .g-tag { font-size: 0.85rem; padding: 4px 8px;}
            .gua-header { flex-direction: column; text-align: center; }
            .gua-classical::before, .gua-classical::after { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>

    <div class="glass-panel">
        <div class="header">
            <h1>乾坤推演</h1>
            <div class="header-line"></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-solar" onclick="switchTab('solar')">公历排盘</button>
            <button class="tab-btn" id="tab-lunar" onclick="switchTab('lunar')">农历排盘</button>
        </div>

        <div class="form-grid">
            <div class="input-group full">
                <label>命主尊号</label>
                <input type="text" id="in-name" placeholder="请输入姓名或称呼 (为您留存纪要)" autocomplete="off">
            </div>

            <div class="input-group">
                <label>生年 (YYYY)</label>
                <input type="number" id="in-year" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>生月 (MM)</label>
                <input type="number" id="in-month" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>生日 (DD)</label>
                <input type="number" id="in-day" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>时辰 (0-23)</label>
                <input type="number" id="in-hour" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>分钟 (0-59)</label>
                <input type="number" id="in-minute" pattern="[0-9]*" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>性别</label>
                <div class="gender-toggle">
                    <button class="gender-btn active" id="btn-male" onclick="setGender(1)">乾男</button>
                    <button class="gender-btn" id="btn-female" onclick="setGender(0)">坤女</button>
                </div>
            </div>
            
            <div class="checkbox-group" id="lunar-options">
                <input type="checkbox" id="is-leap">
                <label for="is-leap">此月为闰月</label>
            </div>
        </div>

        <button class="btn-submit" onclick="calculateBazi()">演 算 乾 坤</button>

        <div class="result-box" id="result-box">
            <div class="date-info" id="date-display"></div>
            
            <div class="bazi-layout">
                <div class="pillar-card">
                    <div class="pillar-title">时柱</div>
                    <div class="bazi-text" id="t-ganzhi"></div>
                    <div class="seal" id="t-wuxing"></div>
                    <div class="seal seal-nayin" id="t-nayin"></div>
                </div>
                <div class="pillar-card">
                    <div class="pillar-title">日柱</div>
                    <div class="bazi-text" id="d-ganzhi"></div>
                    <div class="seal" id="d-wuxing"></div>
                    <div class="seal seal-nayin" id="d-nayin"></div>
                </div>
                <div class="pillar-card">
                    <div class="pillar-title">月柱</div>
                    <div class="bazi-text" id="m-ganzhi"></div>
                    <div class="seal" id="m-wuxing"></div>
                    <div class="seal seal-nayin" id="m-nayin"></div>
                </div>
                <div class="pillar-card">
                    <div class="pillar-title">年柱</div>
                    <div class="bazi-text" id="y-ganzhi"></div>
                    <div class="seal" id="y-wuxing"></div>
                    <div class="seal seal-nayin" id="y-nayin"></div>
                </div>
            </div>

            <div class="geju-section" id="geju-section" style="display: none;">
                <div class="geju-header">
                    <div class="geju-title">命 局 剖 析</div>
                    <div class="geju-daymaster" id="geju-daymaster"></div>
                </div>
                <div class="geju-card" id="geju-card">
                    <div class="geju-tags">
                        <span class="g-tag inner-tag" id="geju-inner-tag"></span>
                        <span class="g-tag outer-tag" id="geju-outer-tag"></span>
                        <span class="g-tag strength-tag" id="geju-strength-tag"></span>
                    </div>
                    <div class="geju-desc" id="geju-desc"></div>
                </div>
            </div>

            <div class="gua-section" id="gua-section" style="display: none;">
                <div class="gua-header">
                    <div class="gua-svg-box" id="gua-svg-box"></div>
                    <div class="gua-title-area">
                        <div class="gua-badge">梅花易数 · 本命卦</div>
                        <div class="gua-name" id="gua-name"></div>
                    </div>
                </div>
                <div class="gua-content">
                    <div class="gua-classical" id="gua-class"></div>
                    <div class="gua-psycho" id="gua-psych"></div>
                </div>
            </div>
        </div>

        <div class="history-section" id="history-section">
            <div class="history-title">—— 推 演 纪 要 ——</div>
            <div class="history-list" id="history-list"></div>
            <button class="btn-clear" onclick="clearHistory()">🧹 清空所有尘缘纪要</button>
        </div>
    </div>

    <script>
        // ====== 命理格局数据词典 ======
        const dayMasterData = {
            "甲": "日主为甲，属阳木。如参天大树，生机勃勃，刚直倔强，极具向上生长的力量。",
            "乙": "日主为乙，属阴木。如花草藤蔓，柔软坚韧，极具适应力，能在逆境中蔓延逢生。",
            "丙": "日主为丙，属阳火。如璀璨太阳，热情无私，光芒四射，能驱散阴霾充满活力。",
            "丁": "日主为丁，属阴火。如星月炉火，内敛温和，洞察人心，能给人带来持久的温暖。",
            "戊": "日主为戊，属阳土。如巍峨高山，稳重包容，诚实守信，是极佳的依靠与壁垒。",
            "己": "日主为己，属阴土。如田园之土，滋养万物，心思细腻，承载力强，蕴含无限生机。",
            "庚": "日主为庚，属阳金。如刀剑矿石，刚毅果断，重情重义，自带肃杀与开创之气。",
            "辛": "日主为辛，属阴金。如珠玉宝石，精致温婉，追求完美，内心自带清高与高贵。",
            "壬": "日主为壬，属阳水。如江河之水，奔流不息，气势磅礴，智商极高且豁达大度。",
            "癸": "日主为癸，属阴水。如雨露甘霖，滋润无声，聪明灵动，具有极强的渗透力与直觉。"
        };

        const zhengGeData = {
            "正官格": "贵气天成，秉公任直。具备极强的管理能力和道德底线，行事有度，适合在正规体系内担任要职。人生信条是秩序与责任。",
            "七杀格": "开拓进取，威风凛凛。极具魄力和执行力，能在逆境中杀出一条血路。带有强烈的个人英雄色彩，适合创业或破局。",
            "正印格": "慈悲仁厚，思想深邃。天然带有书卷气，长辈缘极佳。重视精神世界的丰盈，淡泊名利，极其适合教育与文化领域。",
            "偏印格": "领悟力强，特立独行。具有极高的艺术天赋和敏锐的第六感。不走寻常路，在偏门、宗教、设计或小众领域能取惊人成就。",
            "正财格": "勤俭踏实，按部就班。对金钱和资源有天生敏感度，讲究一分耕耘一分收获。财富积累稳健，极其重视现实与安稳。",

        // ====== 核心推演算法区 ======
        const wxMap = {
            "甲":"木", "乙":"木", "丙":"火", "丁":"火", "戊":"土", "己":"土", "庚":"金", "辛":"金", "壬":"水", "癸":"水",
            "子":"水", "丑":"土", "寅":"木", "卯":"木", "辰":"土", "巳":"火", "午":"火", "未":"土", "申":"金", "酉":"金", "戌":"土", "亥":"水"
        };
        const zhiHidden = { "子":"癸", "丑":"己", "寅":"甲", "卯":"乙", "辰":"戊", "巳":"丙", "午":"丁", "未":"己", "申":"庚", "酉":"辛", "戌":"戊", "亥":"壬" };

        function getTenGodInfo(dayGan, targetGan) {
            const elements = {"甲":"木","乙":"木","丙":"火","丁":"火","戊":"土","己":"土","庚":"金","辛":"金","壬":"水","癸":"水"};
            const polarities = {"甲":1,"乙":0,"丙":1,"丁":0,"戊":1,"己":0,"庚":1,"辛":0,"壬":1,"癸":0};
            const relMap = {
                "木木": [0, 1], "木火": [2, 3], "木土": [4, 5], "木金":[6, 7], "木水": [8, 9],
                "火火":[0, 1], "火土": [2, 3], "火金": [4, 5], "火水":[6, 7], "火木": [8, 9],
                "土土":[0, 1], "土金": [2, 3], "土水":[4, 5], "土木": [6, 7], "土火": [8, 9],
                "金金": [0, 1], "金水": [2, 3], "金木":[4, 5], "金火": [6, 7], "金土":[8, 9],
                "水水": [0, 1], "水木":[2, 3], "水火":[4, 5], "水土": [6, 7], "水金": [8, 9]
            };
            const names =["建禄格", "羊刃格", "食神格", "伤官格", "偏财格", "正财格", "七杀格", "正官格", "偏印格", "正印格"];
            const rawTypes =["比劫","比劫","食伤","食伤","财星","财星","官杀","官杀","印星","印星"];
            let e1 = elements[dayGan], e2 = elements[targetGan];
            let p1 = polarities[dayGan], p2 = polarities[targetGan];
            let index = relMap[e1 + e2][p1 === p2 ? 0 : 1];
            return { name: names[index], type: rawTypes[index], e: e2 };
        }

        // 精密八字格局与强弱分析算法
        function analyzeBazi(baZi) {
            const dG = baZi.getDayGan(), dZ = baZi.getDayZhi();
            const yG = baZi.getYearGan(), yZ = baZi.getYearZhi();
            const mG = baZi.getMonthGan(), mZ = baZi.getMonthZhi();
            const tG = baZi.getTimeGan(), tZ = baZi.getTimeZhi();
            
            const dmElem = wxMap[dG];
            // 计算生扶日主的五行（印星为生，比劫为同）
            const supportElems = dmElem === "木" ? ["水", "木"] : dmElem === "火" ? ["木", "火"] : dmElem === "土" ? ["火", "土"] : dmElem === "金" ?["土", "金"] : ["金", "水"];
            
            // 经典五行权重比赋分(满分100): 月支(40), 日支(15), 时支(10), 年支(10), 月干(10), 时干(10), 年干(5)
            let score = 0;
            const baziChars =[
                { char: mZ, weight: 40 }, { char: dZ, weight: 15 }, { char: tZ, weight: 10 }, { char: yZ, weight: 10 },
                { char: mG, weight: 10 }, { char: tG, weight: 10 }, { char: yG, weight: 5 }
            ];
            
            let elementsCount = { "木":0, "火":0, "土":0, "金":0, "水":0 };
            elementsCount[dmElem] += 1; // 日主本身计入统计但不算分

            baziChars.forEach(item => {
                let e = wxMap[item.char];
                elementsCount[e] += 1;
                if(supportElems.includes(e)) score += item.weight;
            });

            // 1. 判断强弱与极值
            let strengthTag = "";
            let isZhuanWang = false, isCong = false;

            if(score >= 80) { strengthTag = "极强 (专旺)"; isZhuanWang = true; }
            else if(score <= 18) { strengthTag = "极弱 (从格)"; isCong = true; }
            else if(score >= 48) { strengthTag = "身强"; }
            else { strengthTag = "身弱"; }

            // 2. 取正格 (以月令本气为主干经典取格法)
            let mainQi = zhiHidden[mZ] || "甲";
            let zhengGeInfo = getTenGodInfo(dG, mainQi);
            let zhengGe = zhengGeInfo.name;

            // 3. 取变格/外格 (精准古典逻辑)
            let waiGe = "清粹中和格"; 
            let dayGZ = dG + dZ;
            
            // 魁罡查法
            if(["庚辰", "庚戌", "戊戌", "壬辰"].includes(dayGZ)) {
                waiGe = "魁罡格";
            } else if (isZhuanWang) {
                // 五行专旺格局
                if(dmElem === "木") waiGe = "曲直格";
                else if(dmElem === "火") waiGe = "炎上格";
                else if(dmElem === "土") waiGe = "稼穑格";
                else if(dmElem === "金") waiGe = "从革格";
                else if(dmElem === "水") waiGe = "润下格";
                else waiGe = "从旺格";
            } else if (isCong) {
                // 找出最强的克泄耗神来判定从什么
                let maxE = "", maxV = -1;
                for(let k in elementsCount) {
                    if(!supportElems.includes(k) && elementsCount[k] > maxV) { maxV = elementsCount[k]; maxE = k; }
                }
                // 通过十神分类
                if(maxE) {
                    let type = getTenGodInfo(dG, zhiHidden[Object.keys(wxMap).find(k=>wxMap[k]===maxE)] || "甲").type;
                    if(type === "财星") waiGe = "从财格";
                    else if(type === "官杀") waiGe = "从杀格";
                    else waiGe = "从弱格";
                } else {
                    waiGe = "从弱格";
                }
            } else {
                // 组合外格: 提取局中存在的其他十神大类
                let typesInBazi = new Set();
                baziChars.forEach(item => {
                    let tg = zhiHidden[item.char] || item.char; // 转天干
                    if("甲乙丙丁戊己庚辛壬癸".includes(tg)) {
                        typesInBazi.add(getTenGodInfo(dG, tg).type);
                    }
                });
                if(typesInBazi.has("官杀") && typesInBazi.has("印星")) waiGe = "官印相生格";
                else if(typesInBazi.has("食伤") && typesInBazi.has("财星")) waiGe = "食神生财格";
                else if(typesInBazi.has("食伤") && typesInBazi.has("官杀")) waiGe = "食神制杀格";
                else if(typesInBazi.has("伤官") && typesInBazi.has("印星")) waiGe = "伤官佩印格";
            }

            return { zhengGe, waiGe, strengthTag };
        }

            "3-6": { n:"火水未济", c:"火在水上，君子以慎辨物居方。充满未知，无限可能，小狐汔济。", p:"<strong>【探索者原型】</strong>永远保持好奇心，不甘于平庸的现状。人生充满变数与折腾，但正因如此，生命也拥有了无限的延展性与年轻的活力。" },
            "3-7": { n:"火山旅", c:"山上有火，君子以明慎用刑，而不留狱。行商客居，漂泊不定。", p:"<strong>【行者原型】</strong>热爱自由，灵魂不受束缚。见多识广，适应多变的环境。人生如同一场精彩的旅行，沿途的风景远比固定的终点更让你着迷。" },
            "3-8": { n:"火地晋", c:"明出地上，君子以自昭明德。旭日东升，晋升明鉴，康侯用锡马蕃庶。", p:"<strong>【晨曦者原型】</strong>充满朝气，积极进取。事业心强，人生轨迹如同初升的太阳，步步高升。光明磊落的性格让你在职场中备受器重。" },
            "4-1": { n:"雷天大壮", c:"雷在天上，君子以非礼弗履。阳气隆盛，刚健有力，利贞。", p:"<strong>【冲锋者原型】</strong>精力充沛，气场强大。行事果敢，具有雷霆万钧之势。但需注意克制情绪，修炼“知止”的智慧，避免因冲动而招致反噬。" },
            "4-2": { n:"雷泽归妹", c:"泽上有雷，君子以永终知敝。违背常理，感情用事，征凶，无攸利。", p:"<strong>【至情者原型】</strong>重情重义，甚至带有飞蛾扑火的浪漫主义色彩。容易被感情左右判断，人生课题是学习如何在感性与理智之间建立防火墙。" },
            "4-3": { n:"雷火丰", c:"雷电皆至，君子以折狱致刑。日中则昃，丰盛至极，宜日中。", p:"<strong>【极客原型】</strong>才华爆棚，爆发力极强。容易在短时间内攀上人生巅峰，享受光芒万丈。但需铭记盛极必衰的道理，学会未雨绸缪，保持谦逊。" },
            "4-4": { n:"震为雷", c:"洊雷，君子以恐惧修省。雷声震恐，从容不迫，震惊百里。", p:"<strong>【大心脏原型】</strong>行动派，敢闯敢拼。临危不惧，内心十分强大。外界越是动荡不安，越能激发你的斗志与潜能，是乱世中能成就大业的人格。" },
            "4-5": { n:"雷风恒", c:"雷风，君子以立不易方。长久安稳，持之以恒，利有攸往。", p:"<strong>【守恒者原型】</strong>极具恒心与契约精神。忠诚可靠，情绪稳定。在快节奏的社会中，这种“长期主义”的特质极为稀缺，是不可多得的伴侣与基石。" },
            "4-6": { n:"雷水解", c:"雷雨作，君子以赦过宥罪。冰雪消融，化险为夷，利西南。", p:"<strong>【破冰者原型】</strong>心胸豁达，善于原谅与放下。拥有轻松化解危机与矛盾的天赋。总是能将紧张的局势舒缓，是身边人的解语花与烦恼粉碎机。" },
            "4-7": { n:"雷山小过", c:"山上有雷，君子以行过乎恭。阴暗过渡，不可大事，飞鸟遗之音。", p:"<strong>【匠人原型】</strong>心思极其细腻，注重细节。不追求宏大叙事，但在自己的专业小领域里能做到极致。适合做精密细致的技术、财务或研究工作。" },
            "4-8": { n:"雷地豫", c:"雷出地奋，先王以作乐崇德。顺时依势，欢乐和乐，利建侯行师。", p:"<strong>【乐天派原型】</strong>天性乐观，懂得享受生活。拥有极佳的艺术细胞与幽默感。总能用轻松愉快的方式感染周围的人，在快乐中就把事情办成了。" },
            "5-1": { n:"风天小畜", c:"风行天上，君子以懿文德。积蓄力量，密云不雨，自我修养。", p:"<strong>【沉淀者原型】</strong>性格温和细腻，做事循序渐进。不喜张扬，善于在日常中储蓄财富与知识。属于稳扎稳打的“大器晚成”型人格。" },
            "5-2": { n:"风泽中孚", c:"泽上有风，君子以议狱缓死。诚实守信，感化人心，豚鱼吉。", p:"<strong>【真诚者原型】</strong>内心纯粹，极具亲和力与信任感。能够用真心打动所有人，甚至化敌为友。这种至诚的人格是你在商业和人际中最大的底牌。" },
            "5-3": { n:"风火家人", c:"风自火出，君子以言有物而行有恒。男主外女主内，和睦相处，利女贞。", p:"<strong>【守护者原型】</strong>极具家庭观念，温馨体贴。善于营造归属感与安全感。无论在家庭还是在公司团队中，你都是那个让大家心安的“大家长”。" },
            "5-4": { n:"风雷益", c:"风雷，君子以见善则迁。损上益下，大有作为，利有攸往。", p:"<strong>【赋能者原型】</strong>乐于助人，具有极高的社会责任感。信奉利他即是利己的哲学，贵人运极佳。你付出的善意，总会以成倍的好运回报给你。" },
            "5-5": { n:"巽为风", c:"随风，君子以申命行事。柔顺谦逊，无孔不入，小亨。", p:"<strong>【灵通者原型】</strong>八面玲珑，灵活变通。洞察力强，能够顺应甚至穿透任何复杂的圈子。像风一样不拘定法，却能潜移默化地影响一切。" },
            "5-6": { n:"风水涣", c:"风行水上，先王以享于帝立庙。乘风破浪，离散冰释，利涉大川。", p:"<strong>【破壁者原型】</strong>思想前卫，不拘一格。善于打破僵局和传统束缚。当旧有的体系变得腐朽时，你就是那个吹散阴霾、带来全新希望的变革之风。" },
            "5-7": { n:"风山渐", c:"山上有木，君子以居贤德善俗。循序渐进，缓慢发展，女归吉。", p:"<strong>【种树者原型】</strong>做事极有条理，不急不躁。信奉“慢即是快”的哲学，步步为营。基础打得比任何人都扎实，最终的成就往往极其深远稳固。" },
            "5-8": { n:"风地观", c:"风行地上，先王以省方观民设教。仰视高看，体察万物，盥而不荐。", p:"<strong>【观察者原型】</strong>洞察力惊人，思维深邃。习惯退后一步审视全局，具有哲学家的上帝视角。看破不说破，能在静观其变中掌握事物的核心本质。" },
            "6-1": { n:"水天需", c:"云上于天，君子以饮食宴乐。密云不雨，待时而动，有孚，光亨。", p:"<strong>【守望者原型】</strong>极具耐心与战略定力。性格沉稳，懂得延迟满足。能够在逆境中蛰伏并自我充实，一旦时机成熟便能一击必中。" },
            "6-2": { n:"水泽节", c:"泽上有水，君子以制数度。适可而止，节制有度，亨，苦节不可贞。", p:"<strong>【自律者原型】</strong>自控力极强，作息与消费都极具规律。有着清晰的个人底线和原则，拒绝无意义的消耗。高度的自律为你换来了真正的自由。" },
            "6-3": { n:"水火既济", c:"水在火上，君子以思患而预防之。阴阳和谐，功成名就，初吉终乱。", p:"<strong>【圆融者原型】</strong>各方面能力均衡，早年易取得成功。骨子里具有居安思危的忧患意识。性格成熟缜密，做事滴水不漏，是完美的执行者。" },
            "6-4": { n:"水雷屯", c:"云雷屯，君子以经纶。万物始生，艰难险阻，宜建侯而不宁。", p:"<strong>【拓荒者原型】</strong>具有草创精神。属于在混乱与未知中寻找秩序的人格。早年多波折，但阅历的积累会转化为巨大的生存智慧与抗压能力。" },
            "6-5": { n:"水风井", c:"木上有水，君子以劳民劝相。源源不断，滋养万物，改邑不改井。", p:"<strong>【滋养者原型】</strong>内心世界极其丰富，像一口深井般充满智慧与清凉。默默无闻却不可或缺，乐于奉献，你的存在本身就是在滋养身边的环境。" },
            "6-6": { n:"坎为水", c:"水洊至，君子以常德行。重重险阻，随波逐流，习坎，有孚，维心亨。", p:"<strong>【深潜者原型】</strong>极度聪明，心思深沉。能在最复杂、最凶险的环境中生存下来。水利万物而不争，你拥有着常人难以企及的深邃与韧性。" },
            "6-7": { n:"水山蹇", c:"山上有水，君子以反身修德。前途艰险，知难而退，利西南，不利东北。", p:"<strong>【反省者原型】</strong>性格谨慎，防备心重。做事求稳，善于规避人生风险。遇到阻碍时不会死磕，而是懂得向内反省、提升自我，以柔克刚。" },
            "6-8": { n:"水地比", c:"地上有水，先王以建万国，亲诸侯。水土交融，互相依附，吉。", p:"<strong>【协调者原型】</strong>人际交往中的粘合剂。高情商、平易近人，具备极强的合作精神与共情力。总是能敏锐地找到人际关系中的利益契合点。" },
            "7-1": { n:"山天大畜", c:"天在山中，君子以多识前言往行。大量积蓄，底蕴深厚，利贞。", p:"<strong>【博学者原型】</strong>博闻强识，内存丰富。有着海纳百川的胸怀与惊人的学习能力。就像一座藏着宝藏的大山，越是深入了解，越会被你的底蕴折服。" },
            "7-2": { n:"山泽损", c:"山下有泽，君子以惩忿窒欲。损下益上，吃亏是福，有孚，元吉。", p:"<strong>【奉献者原型】</strong>懂得舍得的智慧。具有适当的牺牲精神，愿意成全他人或顾全大局。这种看似“吃亏”的格局，最终必会为你带来长远的丰厚善报。" },
            "7-3": { n:"山火贲", c:"山下有火，君子以明庶政，无敢折狱。注重仪容，文采斐然，亨，小利有攸往。", p:"<strong>【美学家原型】</strong>品位极高，极具审美与艺术修养。注重生活的仪式感与体面。你的存在为枯燥的现实世界增添了一抹极其优雅华丽的色彩。" },
            "7-4": { n:"山雷颐", c:"山下有雷，君子以慎言语，节饮食。修身养性，言语谨慎，贞吉。", p:"<strong>【修道者原型】</strong>极度注重身心健康与内在涵养。言辞得体，行事稳重端庄。能够控制自己的欲望与嘴巴，是一种极高的人格修行。" },
            "7-5": { n:"山风蛊", c:"山下有风，君子以振民育德。除旧布新，挽救危机，元亨，利涉大川。", p:"<strong>【治愈者原型】</strong>天生的医生与改革家。善于发现系统中的腐败漏洞或病灶，并敢于动刀子修复。属于能够在废墟中重建秩序的狠角色。" },
            "7-6": { n:"山水蒙", c:"山下出泉，君子以果行育德。启蒙、发轫之象，童蒙求我。", p:"<strong>【求知者原型】</strong>保持着强烈的求知欲与童心。一生都在寻找人生的导师或真理，遇良师益友则能激发出无穷的潜能与创造力。" },
            "7-7": { n:"艮为山", c:"兼山，君子以思不出其位。静止不动，安分守己，艮其背，不获其身。", p:"<strong>【如山者原型】</strong>极为可靠，沉稳如山。定力极强，外界的风吹草动难以动摇你的心智。明白自己的边界与位置，给人以极大的安全感。" },
            "7-8": { n:"山地剥", c:"山附于地，上以厚下安宅。阴盛阳衰，剥落退败，不利有攸往。", p:"<strong>【蛰伏者原型】</strong>危机意识极强。擅长在低谷与恶劣环境中隐忍生存。懂得审时度势，绝不盲目出头，静静等待阳气复苏的最佳时机。" },
            "8-1": { n:"地天泰", c:"天地交，后以财成天地之道。阴阳和合，万物通泰，小往大来。", p:"<strong>【通达者原型】</strong>自带祥瑞之气的极佳命局。心态极其平和旷达，遇事总能逢凶化吉。能够将不同性格的人或资源完美融合，一生顺遂。" },
            "8-2": { n:"地泽临", c:"泽上有地，君子以教思无穷。居高临下，亲自督导，元亨利贞。", p:"<strong>【导师原型】</strong>具有强烈的责任感与领导风范。喜欢亲力亲为指导后辈，极具教育家精神。你的权威不是来自压迫，而是来自于令人信服的关怀。" },
            "8-3": { n:"地火明夷", c:"明入地中，君子以莅众，用晦而明。光明受挫，内明外暗，利艰贞。", p:"<strong>【守心者原型】</strong>大智若愚，善于隐藏自己的锋芒。在黑暗或不公的环境中，依然能在内心深处守护光明的初心，具有常人难以企及的隐忍与坚守。" },
            "8-4": { n:"地雷复", c:"雷在地中，先王以至日闭关。剥极必复，生机重现，亨。", p:"<strong>【重生者原型】</strong>复原力极强，跌倒了总能迅速爬起。生命中充满了触底反弹的奇迹，每一次挫折都只是为你积攒下一次爆发的能量。" },
            "8-5": { n:"地风升", c:"地中生木，君子以顺德。柔顺上进，步步高升，元亨，用见大人。", p:"<strong>【攀登者原型】</strong>进取心极强，懂得借力打力。像一棵树苗在泥土中默默向上生长，不声不响间便已长成参天大树，职场或人生总能稳步攀升。" },
            "8-6": { n:"地水师", c:"地中有水，君子以容民畜众。聚众兴师，丈人吉，无咎。", p:"<strong>【统帅者原型】</strong>天生的组织者与指挥官。具备卓越的宏观调控能力和危机处理能力。性格坚毅不拔，能够在复杂的斗争环境中凝聚团队。" },
            "8-7": { n:"地山谦", c:"地中有山，君子以裒多益寡。谦受益，满招损，亨，君子有终。", p:"<strong>【至善者原型】</strong>《易经》中唯一的六爻皆吉之卦。实力极其强大却又极其低调谦逊。如大地包容高山，这种虚怀若谷的人格，人皆敬仰，必有善终。" },
            "8-8": { n:"坤为地", c:"地势坤，君子以厚德载物。含弘光大，品物咸亨，牝马之贞。", p:"<strong>【承载者原型】</strong>极具包容力与同理心。能够敏锐感知他人需求，是团队中不可或缺的支持系统与治愈者，拥有润物细无声的强大后劲。" }
        };

        let historyData =[];

        window.onload = () => {
            const now = new Date();
            document.getElementById('in-year').value = now.getFullYear();
            document.getElementById('in-month').value = now.getMonth() + 1;
            document.getElementById('in-day').value = now.getDate();
            document.getElementById('in-hour').value = now.getHours();
            document.getElementById('in-minute').value = now.getMinutes();
            loadHistory();
        };

        function setGender(val) {
            window.currentGender = val;
            document.getElementById('btn-male').classList.remove('active');
            document.getElementById('btn-female').classList.remove('active');
            if(val === 1) document.getElementById('btn-male').classList.add('active');
            else document.getElementById('btn-female').classList.add('active');
        }
        setGender(1); 

        function switchTab(mode) {
            window.currentMode = mode;
            document.getElementById('tab-solar').classList.remove('active');
            document.getElementById('tab-lunar').classList.remove('active');
            document.getElementById('tab-' + mode).classList.add('active');
            document.getElementById('lunar-options').style.display = (mode === 'lunar') ? 'flex' : 'none';
        }
        switchTab('solar');

        function calculateBazi(isFromHistory = false) {
            const name = document.getElementById('in-name').value.trim() || "无名居士";
            const y = parseInt(document.getElementById('in-year').value);
            const m = parseInt(document.getElementById('in-month').value);
            const d = parseInt(document.getElementById('in-day').value);
            const h = parseInt(document.getElementById('in-hour').value);
            const min = parseInt(document.getElementById('in-minute').value);
            const isLeap = document.getElementById('is-leap').checked;

            if (!y || !m || !d) { alert("天地密码未全，请填入完整年月日哦！"); return; }

            let solarDate, lunarDate;
            try {
                if (window.currentMode === 'solar') {
                    solarDate = Solar.fromYmdHms(y, m, d, h || 0, min || 0, 0);
                    lunarDate = solarDate.getLunar();
                } else {
                    const lunarMonth = isLeap ? -Math.abs(m) : Math.abs(m);
                    lunarDate = Lunar.fromYmdHms(y, lunarMonth, d, h || 0, min || 0, 0);
                    solarDate = lunarDate.getSolar();
                }
            } catch (error) { alert("星象有误，请核对输入。\n" + error.message); return; }

            const baZi = lunarDate.getEightChar();
            baZi.setSect(window.currentGender); 

            const genderStr = window.currentGender === 1 ? '乾造 (男)' : '坤造 (女)';
            document.getElementById('date-display').innerHTML = `
                尊号：<span>${name}</span> &nbsp;|&nbsp; 命主：${genderStr} <br>
                公历：${solarDate.toYmd()} &nbsp;&nbsp; 农历：${lunarDate.getYearInGanZhi()}年${lunarDate.getMonthInChinese()}月${lunarDate.getDayInChinese()}
            `;

            document.getElementById('y-ganzhi').innerText = baZi.getYearGan() + baZi.getYearZhi();
            document.getElementById('m-ganzhi').innerText = baZi.getMonthGan() + baZi.getMonthZhi();
            document.getElementById('d-ganzhi').innerText = baZi.getDayGan() + baZi.getDayZhi();
            document.getElementById('t-ganzhi').innerText = baZi.getTimeGan() + baZi.getTimeZhi();

            document.getElementById('y-wuxing').innerText = baZi.getYearWuXing() + "局";
            document.getElementById('m-wuxing').innerText = baZi.getMonthWuXing() + "局";
            document.getElementById('d-wuxing').innerText = baZi.getDayWuXing() + "局";
            document.getElementById('t-wuxing').innerText = baZi.getTimeWuXing() + "局";

            document.getElementById('y-nayin').innerText = baZi.getYearNaYin();
            document.getElementById('m-nayin').innerText = baZi.getMonthNaYin();
            document.getElementById('d-nayin').innerText = baZi.getDayNaYin();
            document.getElementById('t-nayin').innerText = baZi.getTimeNaYin();

            // === 精准命理格局剖析 ===
            const baziAnalysis = analyzeBazi(baZi);
            let dayGan = baZi.getDayGan();
            
            document.getElementById('geju-daymaster').innerText = dayMasterData[dayGan] || `日主为${dayGan}。`;
            document.getElementById('geju-inner-tag').innerText = "正格：" + baziAnalysis.zhengGe;
            document.getElementById('geju-outer-tag').innerText = "外格：" + baziAnalysis.waiGe;
            document.getElementById('geju-strength-tag').innerText = "强弱：" + baziAnalysis.strengthTag;
            
            // 拼接优美的命理剖析描述
            let descHtml = `<strong>【正格 · ${baziAnalysis.zhengGe}】</strong><br/>${zhengGeData[baziAnalysis.zhengGe] || "格局清雅，中和为贵。"}<br/><br/>`;
            descHtml += `<strong>【外格 · ${baziAnalysis.waiGe}】</strong><br/>${waiGeData[baziAnalysis.waiGe] || "五行流转，和顺通达。"}<br/><br/>`;
            descHtml += `<strong>【日主强弱 · ${baziAnalysis.strengthTag}】</strong><br/>${strengthData[baziAnalysis.strengthTag] || "五行平和，生克得宜。"}`;
            
            document.getElementById('geju-desc').innerHTML = descHtml;


            // === 梅花易数本命卦起卦 ===
            let up = (lunarDate.getYearZhiIndex() + 1 + Math.abs(lunarDate.getMonth()) + lunarDate.getDay()) % 8 || 8;
            let low = (lunarDate.getYearZhiIndex() + 1 + Math.abs(lunarDate.getMonth()) + lunarDate.getDay() + lunarDate.getTimeZhiIndex() + 1) % 8 || 8;
            
            const hexKey = `${up}-${low}`;
            let hexInfo = hexData[hexKey];

            document.getElementById('gua-name').innerText = hexInfo.n;
            document.getElementById('gua-class').innerHTML = hexInfo.c;
            document.getElementById('gua-psych').innerHTML = hexInfo.p;

            drawHexagram(up, low);

            if(!isFromHistory) {
                saveHistory({
                    name, mode: window.currentMode, y, m, d, h, min, isLeap, gender: window.currentGender, 
                    hexName: hexInfo.n, dateStr: solarDate.toYmd()
                });
            }

            // === 极美连动效显现 ===
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            document.getElementById('geju-section').style.display = 'block';
            document.getElementById('gua-section').style.display = 'block';
            
            const pillars = document.querySelectorAll('.pillar-card');
            pillars.forEach(p => { p.style.animation = 'none'; p.style.opacity = '0'; });
            
            const gejuCard = document.getElementById('geju-card');
            gejuCard.style.animation = 'none';
            gejuCard.style.opacity = '0';
            
            resultBox.offsetHeight; // 触发重绘
            
            pillars.forEach((p, idx) => {
                p.style.animation = `pillarFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) ${idx * 0.15}s forwards`;
            });
            gejuCard.style.animation = `pillarFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards`;

            if(!isFromHistory) {
                setTimeout(() => {
                    document.getElementById('gua-section').scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 500);
            }
        }

        // ====== IntersectionObserver ======
        function drawHexagram(upper, lower) {
            const upYao = trigramYao[upper]; const lowYao = trigramYao[lower];
            const sixYao =[...lowYao, ...upYao]; 
            
            let svgHtml = `<svg viewBox="0 0 100 130" width="100%" height="100%">`;
            const yPositions =[15, 35, 55, 80, 100, 120]; 
            
            for(let i=5; i>=0; i--) {
                const isYang = sixYao[i] === 1;
                const yPos = yPositions[5-i];
                if (isYang) {
                    svgHtml += `<line x1="5" y1="${yPos}" x2="95" y2="${yPos}" class="yao-line" />`;
                } else {
                    svgHtml += `<line x1="5" y1="${yPos}" x2="42" y2="${yPos}" class="yao-line" />`;
                    svgHtml += `<line x1="58" y1="${yPos}" x2="95" y2="${yPos}" class="yao-line" />`;
                }
            }
            svgHtml += `</svg>`;
            
            const box = document.getElementById('gua-svg-box');
            box.innerHTML = svgHtml;

            if(window.guaObserver) window.guaObserver.disconnect();
            window.guaObserver = new IntersectionObserver((entries) => {
                if(entries[0].isIntersecting) {
                    const lines = box.querySelectorAll('.yao-line');
                    lines.forEach((line, idx) => {
                        line.style.animation = `drawYao 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) ${idx * 0.18}s forwards`;
                    });
                    window.guaObserver.disconnect();
                }
            }, { threshold: 0.2 }); 
            window.guaObserver.observe(box);
        }

        // ====== 历史纪要逻辑 ======
        function saveHistory(data) {
            historyData = historyData.filter(item => item.name !== data.name || item.name === '无名居士');
            historyData.unshift(data); 
            if(historyData.length > 8) historyData.pop(); 
            localStorage.setItem('bazi_history', JSON.stringify(historyData));
            renderHistory();
        }

        function loadHistory() {
            const saved = localStorage.getItem('bazi_history');
            if(saved) {
                historyData = JSON.parse(saved);
                renderHistory();
            }
        }

        function renderHistory() {
            const section = document.getElementById('history-section');
            const list = document.getElementById('history-list');
            if(historyData.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            list.innerHTML = '';
            
            historyData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="h-name">${item.name}</span>
                    <span class="h-gua">${item.hexName}</span>
                    <span class="h-date">${item.dateStr}</span>
                `;
                div.onclick = () => loadRecord(index);
                list.appendChild(div);
            });
        }

        function loadRecord(index) {
            const item = historyData[index];
            document.getElementById('in-name').value = item.name === '无名居士' ? '' : item.name;
            document.getElementById('in-year').value = item.y;
            document.getElementById('in-month').value = item.m;
            document.getElementById('in-day').value = item.d;
            document.getElementById('in-hour').value = item.h;
            document.getElementById('in-minute').value = item.min;
            document.getElementById('is-leap').checked = item.isLeap;
            switchTab(item.mode);
            setGender(item.gender);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            calculateBazi(true);
        }

        function clearHistory() {
            if(confirm("纪要一旦清空便如风过无痕，确定要舍弃这些缘分记录吗？")) {
                localStorage.removeItem('bazi_history'); 
                alert("尘缘已了，过往纪要已悉数随风消散。愿您未来的推演皆是上上大吉。");
                window.location.reload(true);
            }
        }
    </script>
</body>
